name: Deploy GitHub Pages

# Déploie le site statique de la formation sur GitHub Pages.
# Fonctionne en dépôt privé comme public (Pages doit être activé dans
# Settings → Pages → Source: GitHub Actions).

on:
  push:
    branches:
      - main
      - claude/beautiful-shannon-9iF1l
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Une seule exécution à la fois ; n'annule pas un déploiement en cours.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
